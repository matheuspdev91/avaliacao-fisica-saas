{% extends 'core/base.html' %}

{% block title %}Nova senha | FitFlix{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">FitFlix</div>
        <h1 class="auth-title">Nova senha</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-full">Alterar senha</button>
        </form>
    </div>
</section>
{% endblock %}
