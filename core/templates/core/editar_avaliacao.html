{% extends 'core/base.html' %}

{% block title %}Editar avaliação | FitFlix{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <h1 class="page-title">Editar avaliação</h1>
        <p class="page-subtitle">{{ avaliacao.nome }}</p>
    </div>
</section>

<section class="fitflix-form-container">
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="d-flex gap-12 mt-16">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'core:detalhe_avaliacao' avaliacao.id %}" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
