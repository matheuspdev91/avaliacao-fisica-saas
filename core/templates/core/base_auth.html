<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitFlix{% endblock %}</title>

    {% load static %}

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            color:#fff;
            font-family:Arial,sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .auth-container{
            width:100%;
            max-width:450px;
            padding:20px;
        }

        .auth-card{
            background:#111;
            border:1px solid rgba(0,255,136,.2);
            border-radius:20px;
            padding:40px;
            box-shadow:0 0 30px rgba(0,255,136,.08);
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo h1{
            color:#00ff88;
            font-size:3rem;
        }

        .logo p{
            color:#aaa;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:14px;
            margin-top:8px;
            margin-bottom:20px;
            background:#181818;
            border:1px solid #333;
            border-radius:10px;
            color:white;
        }

        input:focus{
            outline:none;
            border-color:#00ff88;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#00ff88;
            color:#000;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#00e67a;
        }

        .messages{
            margin-bottom:20px;
        }

        .messages div{
            background:#220000;
            border:1px solid #ff4444;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;
        }

        a{
            color:#00ff88;
        }
    </style>
</head>
<body>

<div class="auth-container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
