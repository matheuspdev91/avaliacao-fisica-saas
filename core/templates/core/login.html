{% extends "core/base.html" %}

{% block title %}Entrar | FitFlix{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">FitFlix</div>
        <p class="auth-subtitle">Entre para gerenciar avaliações e treinos.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="email" name="email" id="email" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input class="form-control" type="password" name="password" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-full">Entrar</button>
        </form>

        <div class="auth-divider"><span></span><em>ou</em><span></span></div>
        <p class="text-center">
            <a href="{% url 'core:password_reset' %}" class="auth-link">Esqueci minha senha</a>
        </p>
    </div>
</section>
{% endblock %}
