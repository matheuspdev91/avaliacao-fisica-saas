{% extends 'core/base.html' %}

{% block title %}Criar exercício | FitFlix{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <h1 class="page-title">Criar exercício</h1>
        <p class="page-subtitle">Cadastre o movimento principal e uma variação padrão com GIF.</p>
    </div>
</section>

<section class="section mt-24">
    <div class="form-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="nome">Nome do exercício</label>
                <input class="form-control" type="text" name="nome" id="nome" placeholder="Ex: Supino reto" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="grupo_muscular">Grupo muscular</label>
                <select class="form-control" name="grupo_muscular" id="grupo_muscular" required>
                    <option value="">Selecione...</option>
                    {% for grupo in grupos %}
                        <option value="{{ grupo.id }}">{{ grupo.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="gif">GIF</label>
                <input class="form-control" type="file" name="gif" id="gif" accept="image/gif,image/*">
            </div>
            <div class="d-flex gap-12">
                <button type="submit" class="btn btn-primary">Salvar exercício</button>
                <a href="{% url 'core:fitflix' %}" class="btn btn-ghost">Voltar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
