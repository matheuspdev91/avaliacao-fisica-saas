{% extends 'core/base.html' %}

{% block title %}Adicionar exercício | FitFlix{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <h1 class="page-title">Adicionar exercício</h1>
        <p class="page-subtitle">{{ treino.nome }} · {{ treino.aluno.nome }}</p>
    </div>
</section>

<section class="fitflix-form-container">
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="exercicio">Exercício</label>
                    <select class="form-control" name="exercicio" id="exercicio" required>
                        <option value="">Selecione</option>
                        {% for exercicio in exercicios %}
                            <option value="{{ exercicio.id }}">{{ exercicio.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="variacao">Variação</label>
                    <select class="form-control" name="variacao" id="variacao" required>
                        <option value="">Selecione um exercício primeiro</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <img id="preview-gif" src="" alt="Preview do exercício" class="fitflix-exercise-thumb preview-gif is-hidden">
            </div>

            <div class="form-row form-row-3">
                <div class="form-group">
                    <label class="form-label" for="series">Séries</label>
                    <input class="form-control" type="number" name="series" id="series" min="1" value="3" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="repeticoes">Repetições</label>
                    <input class="form-control" type="number" name="repeticoes" id="repeticoes" min="1" value="12" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="descanso">Descanso</label>
                    <input class="form-control" type="number" name="descanso" id="descanso" min="0" value="60" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="carga">Carga</label>
                <input class="form-control" type="text" name="carga" id="carga" placeholder="Ex: 20kg">
            </div>

            <div class="d-flex gap-12">
                <button type="submit" class="btn btn-primary">Adicionar exercício</button>
                <a href="{% url 'core:editar_treino' treino.id %}" class="btn btn-ghost">Voltar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    var exercicioSelect = document.getElementById('exercicio');
    var variacaoSelect = document.getElementById('variacao');
    var preview = document.getElementById('preview-gif');

    exercicioSelect.addEventListener('change', async function () {
        var exercicioId = this.value;
        variacaoSelect.innerHTML = '<option value="">Carregando...</option>';
        preview.classList.add('is-hidden');

        if (!exercicioId) {
            variacaoSelect.innerHTML = '<option value="">Selecione um exercício primeiro</option>';
            return;
        }

        try {
            var response = await fetch('/api/variacoes/' + exercicioId + '/');
            var variacoes = await response.json();
            variacaoSelect.innerHTML = '<option value="">Selecione</option>';
            variacoes.forEach(function (variacao) {
                var option = document.createElement('option');
                option.value = variacao.id;
                option.textContent = variacao.nome;
                option.dataset.gif = variacao.gif_url || '';
                variacaoSelect.appendChild(option);
            });
        } catch (error) {
            variacaoSelect.innerHTML = '<option value="">Erro ao carregar</option>';
        }
    });

    variacaoSelect.addEventListener('change', function () {
        var selected = this.options[this.selectedIndex];
        var gif = selected.dataset.gif;
        preview.src = gif || '';
        preview.classList.toggle('is-hidden', !gif);
    });
});
</script>
{% endblock %}
