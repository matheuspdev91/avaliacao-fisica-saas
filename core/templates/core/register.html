{% extends 'core/base.html' %}

{% block title %}Criar conta | FitFlix{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">FitFlix</div>
        <h1 class="auth-title">Criar conta</h1>
        <p class="auth-subtitle">Configure seu acesso de personal trainer.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input class="form-control" type="text" name="username" id="username" value="{{ username|default:'' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="email" name="email" id="email" value="{{ email|default:'' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input class="form-control" type="password" name="password" id="password" minlength="6" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password_confirm">Confirmar senha</label>
                <input class="form-control" type="password" name="password_confirm" id="password_confirm" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Criar conta</button>
        </form>

        <div class="auth-divider"><span></span><em>já tem conta?</em><span></span></div>
        <p class="text-center"><a href="{% url 'core:login' %}" class="auth-link">Entrar</a></p>
    </div>
</section>
{% endblock %}
